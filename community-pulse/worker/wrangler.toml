name = "marblehead-community-pulse"
main = "src/index.js"
compatibility_date = "2026-04-01"

[[d1_databases]]
binding = "DB"
database_name = "community-pulse"
database_id = "e6c6e7ad-b93e-4d80-aeea-58e50e4ba43e"
migrations_dir = "schema"

[vars]
ALLOWED_ORIGIN = "https://marbleheaddata.org"

[dev]
port = 8787

# ── Staging environment ──────────────────────────────────
# Deploy: npx wrangler deploy --env staging
# URL: https://marblehead-community-pulse-staging.<account>.workers.dev
[env.staging]
name = "marblehead-community-pulse-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "community-pulse-staging"
database_id = "bf73e7fc-d8c2-42aa-96f6-133c3059b14c"
migrations_dir = "schema"

[env.staging.vars]
ALLOWED_ORIGIN = "*"
JWT_SECRET = "staging-secret-not-for-production"
